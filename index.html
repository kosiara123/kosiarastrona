<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kosiara</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://media.discordapp.net/attachments/1487482069549580308/1487777182460674119/czerwono_czarny_spiderman.jpg?ex=69ca5ff9&is=69c90e79&hm=7b26b74dad3ea8f397f14d4ffc0e860678ebeeee0cd9b71ec135babe088dfd03&=&format=webp&width=1376&height=860') no-repeat center center/cover;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    /* przyciemnienie żeby tekst był czytelny */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid red;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h1 span {
      color: red;
      text-shadow: 0 0 10px red;
    }

    .subtitle {
      color: #ccc;
      margin-bottom: 30px;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
    }

    .stat {
      font-size: 1.2rem;
    }

    .stat small {
      display: block;
      color: red;
      font-size: 0.7rem;
      margin-top: 5px;
    }

    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn {
      padding: 15px;
      border-radius: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,0,0,0.3);
      text-decoration: none;
      color: white;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      background: red;
      transform: scale(1.05);
      box-shadow: 0 0 15px red;
    }

    @media(max-width: 500px) {
      .links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://media.discordapp.net/attachments/1487482069549580308/1487776881150267442/arab_kosiara_skin_mc_rysowany.png?ex=69ca5fb2&is=69c90e32&hm=c9692710426c02e2c296527c6dd64d691f3767c116068a69d8b41367421ba77b&=&format=webp&quality=lossless" alt="avatar" class="avatar">
    <h1>Siema, tu <span>Kosiara</span></h1>
    <div class="subtitle">ŚMIESZEK • CONTENT CREATOR • STREAMER</div>

    <div class="stats">
      <div class="stat">2026<small>GLOBAL AD</small></div>
      <div class="stat">100%<small>PASJI</small></div>
      <div class="stat">PRO<small>MONTAŻ</small></div>
      <div class="stat">PRO<small>GRAFIK</small></div>
 </div>

    <div class="links">
      <a href="https://www.youtube.com/@Kosiara2/videos" class="btn">YouTube</a>
      <a href="https://www.tiktok.com/@.kosiara_331" class="btn">TikTok</a>
      <a href="https://kick.com/kosiaragg" class="btn">Kick</a>
      <a href="https://www.twitch.tv/kosiaragg1" class="btn">Twitch</a>
      <a href="https://discord.gg/z3aqNw6SCv" class="btn">Discord</a>
      <a href="https://www.behance.net/zwyklychlopiec" class="btn">Portfolio grafika</a>
    </div>
  </div>
</body>
</html>
